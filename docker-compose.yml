services:
  postgres:
    image: ${REGISTRY_PREFIX:-}postgres:16.12-alpine3.23
    hostname: doc-compare-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dict}
      POSTGRES_DB: ${POSTGRES_DB:-dictdb}
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dict} -d ${POSTGRES_DB:-dictdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ${REGISTRY_PREFIX:-}redis:7.4.8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    networks:
      - default
      - common_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dict:dict@doc-compare-postgres:5432/dictdb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-local}
      FILE_STORAGE_LOCAL_PATH: ${FILE_STORAGE_LOCAL_PATH:-/data/uploads}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-500}
      API_PORT: ${API_PORT:-3000}
      DIFF_API_RATE_LIMIT_PER_MINUTE: ${DIFF_API_RATE_LIMIT_PER_MINUTE:-60}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      SCANNED_PDF_ENERGY_COST: ${SCANNED_PDF_ENERGY_COST:-5000}
      FREE_TIER_WORD_CAP: ${FREE_TIER_WORD_CAP:-100}
    volumes:
      - ${DATA_DIR:-./data}/uploads:/data/uploads
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    command: ["node", "--max-old-space-size=2560", "dist/workers/index.js"]
    mem_limit: 3000m
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://dict:dict@doc-compare-postgres:5432/dictdb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-local}
      FILE_STORAGE_LOCAL_PATH: ${FILE_STORAGE_LOCAL_PATH:-/data/uploads}
      PRISMA_TRANSACTION_TIMEOUT_MS: ${PRISMA_TRANSACTION_TIMEOUT_MS:-30000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      SCANNED_PDF_ENERGY_COST: ${SCANNED_PDF_ENERGY_COST:-5000}
      FREE_TIER_WORD_CAP: ${FREE_TIER_WORD_CAP:-100}
    volumes:
      - ${DATA_DIR:-./data}/uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    hostname: doc-compare-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    networks:
      - default
      - common_backend
    environment:
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-10}
    volumes:
      - ../frontend-overrides/assets/img:/usr/share/nginx/html/overrides/img:ro
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy

networks:
  common_backend:
    external: true
