server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Enable ETag for conditional requests
    etag on;

    # Upload size limit (configurable via UPLOAD_MAX_SIZE_MB env var)
    client_max_body_size ${UPLOAD_MAX_SIZE_MB}M;

    # Static assets with hash - cache for 1 year (immutable)
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        access_log off;
    }

    # Vue Router - fallback to index.html for SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        set $api_upstream api:3000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Also set upload limit for proxied requests
        client_max_body_size ${UPLOAD_MAX_SIZE_MB}M;
    }

    # Proxy Socket.io
    location /socket.io/ {
        set $api_upstream api:3000;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
